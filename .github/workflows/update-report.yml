name: Update Competitive Intelligence Report

on:
  schedule:
    - cron: '0 21 * * *'   # 21:00 UTC = 06:00 KST
  workflow_dispatch:         # manual trigger from GitHub Actions tab

permissions:
  contents: write   # needed to push report.json
  models: read      # needed for GitHub Models API

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openai pytz

      - name: Run update script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/update_report.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add report.json
          git diff --staged --quiet && echo "No changes to commit" || (
            git commit -m "chore: auto-update report $(TZ='Asia/Seoul' date +'%Y-%m-%d %H:%M KST')"
            git push
          )
