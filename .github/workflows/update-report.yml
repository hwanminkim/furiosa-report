name: Update Highlights

on:
  schedule:
    - cron: '20 20 * * *' # 20:20 UTC = 05:20 KST
    # ── 아침 KST 공백 보강 (GitHub cron이 정각/:20에 잘 밀려서 off-peak 분으로 중복 배치) ──
    - cron: '43 22 * * *' # 22:43 UTC = 07:43 KST
    - cron: '20 0 * * *'  # 00:20 UTC = 09:20 KST
    - cron: '47 1 * * *'  # 01:47 UTC = 10:47 KST
    - cron: '20 2 * * *'  # 02:20 UTC = 11:20 KST
    - cron: '11 3 * * *'  # 03:11 UTC = 12:11 KST
    - cron: '20 4 * * *'  # 04:20 UTC = 13:20 KST
    # ── 오후/저녁 (기존) ──
    - cron: '20 7 * * *'  # 07:20 UTC = 16:20 KST
    - cron: '20 11 * * *' # 11:20 UTC = 20:20 KST
  workflow_dispatch:

permissions:
  contents: write

# 같은 시각대 cron이 겹쳐 동시 실행되며 LLM 엔드포인트 경쟁·커밋 충돌하는 것 방지.
# 실행 중이면 새 트리거는 대기(가장 최근 대기분만 유지, 오래된 대기분은 자동 취소).
concurrency:
  group: update-report
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install openai pytz trafilatura
      - name: Run update script
        env:
          FURIOSA_EXAONE_API_KEY: ${{ secrets.FURIOSA_EXAONE_API_KEY }}
          FURIOSA_EMBEDDING_API_KEY: ${{ secrets.FURIOSA_EMBEDDING_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python scripts/update_report.py
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add report.json
          git diff --staged --quiet && echo "No changes" || (
            git commit -m "chore: update highlights $(TZ='Asia/Seoul' date +'%Y-%m-%d %H:%M KST')"
            # report.json은 매 실행 전체 재생성되므로, 동시 커밋 충돌 시 이번 실행 결과를 채택(-X theirs)
            for i in 1 2 3; do
              git pull --rebase -X theirs origin main && git push && break
              echo "push retry $i"; sleep 5
            done
          )
