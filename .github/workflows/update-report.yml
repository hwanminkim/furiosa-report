name: Update Highlights

on:
  schedule:
    - cron: '20 20 * * *' # 20:20 UTC = 05:20 KST
    - cron: '20 0 * * *'  # 00:20 UTC = 09:20 KST
    - cron: '20 2 * * *'  # 02:20 UTC = 11:20 KST
    - cron: '20 4 * * *'  # 04:20 UTC = 13:20 KST
    - cron: '20 7 * * *'  # 07:20 UTC = 16:20 KST
    - cron: '20 11 * * *' # 11:20 UTC = 20:20 KST
  workflow_dispatch:

permissions:
  contents: write
  models: read

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install openai pytz
      - name: Run update script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          NEWSDATA_API_KEY: ${{ secrets.NEWSDATA_API_KEY }}
        run: python scripts/update_report.py
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add report.json
          git diff --staged --quiet && echo "No changes" || (
            git commit -m "chore: update highlights $(TZ='Asia/Seoul' date +'%Y-%m-%d %H:%M KST')"
            git pull --rebase origin main
            git push
          )
