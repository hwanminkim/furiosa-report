name: Update Highlights

on:
  schedule:
    - cron: '20 20 * * *' # 20:20 UTC = 05:20 KST
    - cron: '20 0 * * *'  # 00:20 UTC = 09:20 KST
    - cron: '20 2 * * *'  # 02:20 UTC = 11:20 KST
    - cron: '20 4 * * *'  # 04:20 UTC = 13:20 KST
    - cron: '20 7 * * *'  # 07:20 UTC = 16:20 KST
    - cron: '20 11 * * *' # 11:20 UTC = 20:20 KST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install openai pytz trafilatura
      - name: Run update script
        env:
          FURIOSA_EXAONE_API_KEY: ${{ secrets.FURIOSA_EXAONE_API_KEY }}
          FURIOSA_EMBEDDING_API_KEY: ${{ secrets.FURIOSA_EMBEDDING_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python scripts/update_report.py
      - name: Verify summaries (temp)
        run: |
          python3 - <<'PY'
          import json, re
          d = json.load(open('report.json'))
          def has_ko(s): return bool(re.search(r'[가-힣]', s or ''))
          tot=fil=ko=0
          allitems=[]
          for c in d.get('companies', []):
              for it in c['items']: allitems.append(it)
          for g in ('furiosa_daily','furiosa_weekly'):
              for k,v in d.get(g,{}).items():
                  for it in v: allitems.append(it)
          for it in allitems:
              tot+=1; s=(it.get('summary') or '').strip()
              if s: fil+=1
              if has_ko(s): ko+=1
          print(f"[VERIFY] filled={fil}/{tot}  korean={ko}/{tot}")
          for it in allitems:
              s=(it.get('summary') or '').strip()
              tag = 'EMPTY' if not s else ('KO' if has_ko(s) else 'EN!')
              print(f"[VERIFY] {tag} | {it['title'][:45]} | {s[:70]}")
          PY
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add report.json
          git diff --staged --quiet && echo "No changes" || (
            git commit -m "chore: update highlights $(TZ='Asia/Seoul' date +'%Y-%m-%d %H:%M KST')"
            git pull --rebase origin main
            git push
          )
