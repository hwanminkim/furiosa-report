<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Furiosa BD 경쟁사 동향 리포트</title>
<style>
  @font-face {
    font-family: 'ABCFavorit';
    src: url('assets/fonts/ABCFavorit-Regular.otf') format('opentype');
    font-weight: 400;
  }
  @font-face {
    font-family: 'ABCFavorit';
    src: url('assets/fonts/ABCFavorit-Medium.otf') format('opentype');
    font-weight: 500;
  }
  @font-face {
    font-family: 'ABCFavorit';
    src: url('assets/fonts/ABCFavorit-Bold.otf') format('opentype');
    font-weight: 700;
  }
  @font-face {
    font-family: 'ABCFavoritHangul';
    src: url('assets/fonts/ABCFavoritHangul-Regular.otf') format('opentype');
    font-weight: 400;
  }
  @font-face {
    font-family: 'ABCFavoritHangul';
    src: url('assets/fonts/ABCFavoritHangul-Medium.otf') format('opentype');
    font-weight: 500;
  }
  @font-face {
    font-family: 'ABCFavoritHangul';
    src: url('assets/fonts/ABCFavoritHangul-Bold.otf') format('opentype');
    font-weight: 700;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #E21500;
    --black: #0D0D0D;
    --card: #1A1A1A;
    --border: #2A2A2A;
    --text: #F0F0F0;
    --muted: #777;
    --header-h: 64px;
  }

  html, body { height: 100%; overflow: hidden; }

  body {
    font-family: 'ABCFavoritHangul', 'ABCFavorit', -apple-system, sans-serif;
    background: var(--black);
    color: var(--text);
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    height: var(--header-h);
    flex-shrink: 0;
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--black);
    z-index: 10;
  }

  header a { display: block; line-height: 0; }
  header img { height: 26px; }

  .header-tag {
    font-family: 'ABCFavorit', sans-serif;
    font-size: 0.68rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 2px;
  }

  /* ── Layout ── */
  .layout { flex: 1; display: flex; overflow: hidden; }

  /* ── Sidebar ── */
  aside {
    width: 188px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 28px 0 40px;
  }

  .sidebar-label {
    font-family: 'ABCFavorit', sans-serif;
    font-size: 0.62rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0 20px 8px;
  }

  .sidebar-divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 16px 20px;
  }

  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 20px;
    font-size: 0.83rem;
    color: #999;
    cursor: pointer;
    transition: color 0.15s, background 0.1s;
    border-left: 2px solid transparent;
  }

  .sidebar-item:hover { color: var(--text); background: rgba(255,255,255,0.03); }

  .sidebar-item.active {
    color: var(--text);
    border-left-color: var(--red);
    background: rgba(226,21,0,0.06);
  }

  .sidebar-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--red);
    flex-shrink: 0;
  }

  /* ── Main ── */
  main {
    flex: 1;
    overflow-y: auto;
    padding: 36px 40px 80px;
  }

  .page-eyebrow {
    font-family: 'ABCFavorit', sans-serif;
    font-size: 0.68rem;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--red);
    margin-bottom: 10px;
  }

  h1 { font-size: 1.6rem; font-weight: 700; line-height: 1.2; margin-bottom: 6px; }

  .meta {
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 36px;
    padding-bottom: 28px;
    border-bottom: 1px solid var(--border);
  }

  .section-label {
    font-family: 'ABCFavorit', sans-serif;
    font-size: 0.62rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  /* ── Highlights grid ── */
  .top-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 36px;
  }

  .highlight-badge {
    font-family: 'ABCFavorit', sans-serif;
    font-size: 0.62rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--red);
    background: rgba(226,21,0,0.12);
    padding: 2px 7px;
    border-radius: 2px;
    display: inline-block;
    margin-bottom: 8px;
  }

  .hl-card {
    display: block;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 14px 16px;
    margin-bottom: 10px;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.15s;
  }

  .hl-card.linked:hover { border-color: var(--red); }
  .hl-card.furiosa-card { border-left: 2px solid var(--red); }

  .hl-card-company {
    font-family: 'ABCFavorit', sans-serif;
    font-size: 0.62rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--red);
    display: block;
    margin-bottom: 4px;
  }

  .hl-card-text { font-size: 0.84rem; color: #C8C8C8; line-height: 1.55; }
  .item-arrow { font-size: 0.68rem; color: var(--muted); margin-left: 3px; }

  /* ── Company cards ── */
  .company {
    border: 1px solid var(--border);
    border-radius: 4px;
    margin-bottom: 10px;
    background: var(--card);
    transition: border-color 0.15s;
    scroll-margin-top: 20px;
  }

  .company-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 18px;
    cursor: pointer;
    user-select: none;
  }

  .company-header:hover .company-name { color: #fff; }

  .company-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--red);
    flex-shrink: 0;
  }

  .company-name { font-size: 0.9rem; font-weight: 600; transition: color 0.15s; }

  .header-chevron { margin-left: auto; font-size: 0.65rem; color: var(--muted); }

  /* ── Modal ── */
  .modal-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }

  .modal-backdrop.open { display: flex; }

  .modal {
    background: #1E1E1E;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 24px;
    width: 300px;
    box-shadow: 0 24px 48px rgba(0,0,0,0.5);
  }

  .modal-title {
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 5px;
  }

  .modal-company { font-size: 1.1rem; font-weight: 700; margin-bottom: 18px; }

  .modal-links { display: flex; flex-direction: column; gap: 8px; }

  .modal-link {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 14px;
    border: 1px solid #333;
    border-radius: 4px;
    text-decoration: none;
    color: var(--text);
    font-size: 0.86rem;
    transition: border-color 0.15s, background 0.15s;
  }

  .modal-link:hover { border-color: var(--red); background: rgba(226,21,0,0.06); }
  .modal-link-icon { font-size: 1rem; width: 20px; text-align: center; }
  .modal-link-label { flex: 1; }
  .modal-link-arrow { font-size: 0.68rem; color: var(--muted); }

  .modal-close {
    display: block;
    margin-top: 14px;
    width: 100%;
    padding: 8px;
    background: none;
    border: 1px solid #333;
    border-radius: 4px;
    color: var(--muted);
    font-size: 0.78rem;
    cursor: pointer;
    font-family: inherit;
    transition: border-color 0.15s, color 0.15s;
  }

  .modal-close:hover { border-color: #555; color: var(--text); }
</style>
</head>
<body>

<header>
  <a href="index.html"><img src="assets/img/Furiosa_AI_h_w.png" alt="Furiosa AI"></a>
  <span class="header-tag">BD Internal</span>
</header>

<div class="layout">
  <aside id="sidebar"></aside>

  <main id="main-content">
    <div class="page-eyebrow">Competitive Intelligence</div>
    <h1>경쟁사 동향 리포트</h1>
    <div class="meta" id="meta">Furiosa BD 참고용</div>

    <div class="top-grid" id="highlights">
      <div>
        <div class="section-label">Furiosa 주간 하이라이트</div>
        <div id="furiosa-highlights"></div>
      </div>
      <div>
        <div class="section-label">이번 주 경쟁사 하이라이트</div>
        <div id="competitor-highlights"></div>
      </div>
    </div>

    <div class="section-label">회사별 동향 — Global</div>
    <div id="companies-global"></div>

    <div class="section-label" style="margin-top:28px;">회사별 동향 — Korea</div>
    <div id="companies-korea"></div>
  </main>
</div>

<!-- Company link modal -->
<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal">
    <div class="modal-title">Company</div>
    <div class="modal-company" id="modal-company-name"></div>
    <div class="modal-links">
      <a class="modal-link" id="modal-website" href="#" target="_blank" rel="noopener">
        <span class="modal-link-icon">🌐</span>
        <span class="modal-link-label">웹사이트</span>
        <span class="modal-link-arrow">↗</span>
      </a>
      <a class="modal-link" id="modal-blog" href="#" target="_blank" rel="noopener">
        <span class="modal-link-icon">📝</span>
        <span class="modal-link-label">블로그</span>
        <span class="modal-link-arrow">↗</span>
      </a>
    </div>
    <button class="modal-close" id="modal-close">닫기</button>
  </div>
</div>

<script>
  const COMPANIES = {
    global: [
      { name: "NVIDIA",      website: "https://www.nvidia.com",    blog: "https://blogs.nvidia.com" },
      { name: "Groq",        website: "https://groq.com",           blog: "https://groq.com/blog" },
      { name: "Cerebras",    website: "https://cerebras.net",       blog: "https://cerebras.net/blog" },
      { name: "SambaNova",   website: "https://sambanova.ai",       blog: "https://sambanova.ai/blog" },
      { name: "Tenstorrent", website: "https://tenstorrent.com",    blog: "https://tenstorrent.com/blog" },
    ],
    korea: [
      { name: "리벨리온",   website: "https://rebellions.ai",  blog: "https://rebellions.ai/blog" },
      { name: "딥엑스",     website: "https://deepx.ai",        blog: "https://deepx.ai/blog" },
      { name: "하이퍼엑셀", website: "https://hyperaccel.ai",   blog: "https://hyperaccel.ai/blog" },
      { name: "모빌린트",   website: "https://mobilint.com",    blog: "https://mobilint.com/blog" },
    ]
  };

  // Modal
  const backdrop = document.getElementById('modal-backdrop');
  document.getElementById('modal-close').addEventListener('click', () => backdrop.classList.remove('open'));
  backdrop.addEventListener('click', e => { if (e.target === backdrop) backdrop.classList.remove('open'); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') backdrop.classList.remove('open'); });

  function openModal(company) {
    document.getElementById('modal-company-name').textContent = company.name;
    document.getElementById('modal-website').href = company.website;
    document.getElementById('modal-blog').href    = company.blog;
    backdrop.classList.add('open');
  }

  function renderCompany(c) {
    return `<div class="company" id="co-${c.name}">
      <div class="company-header" data-name="${c.name}">
        <div class="company-dot"></div>
        <span class="company-name">${c.name}</span>
        <span class="header-chevron">⊕</span>
      </div>
    </div>`;
  }

  document.getElementById('companies-global').innerHTML = COMPANIES.global.map(renderCompany).join('');
  document.getElementById('companies-korea').innerHTML  = COMPANIES.korea.map(renderCompany).join('');

  // Sidebar
  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = `
    <div class="sidebar-item" data-target="highlights" style="margin-bottom:4px;">
      <span class="sidebar-dot"></span>이번 주 하이라이트
    </div>
    <hr class="sidebar-divider">
    <div class="sidebar-label">Global</div>
    ${COMPANIES.global.map(c => `
      <div class="sidebar-item" data-target="co-${c.name}">
        <span class="sidebar-dot"></span>${c.name}
      </div>`).join('')}
    <hr class="sidebar-divider">
    <div class="sidebar-label">Korea</div>
    ${COMPANIES.korea.map(c => `
      <div class="sidebar-item" data-target="co-${c.name}">
        <span class="sidebar-dot"></span>${c.name}
      </div>`).join('')}
  `;

  // Sidebar click → scroll to center
  const mainContent = document.getElementById('main-content');
  function setActiveSidebarItem(targetId) {
    sidebar.querySelectorAll('.sidebar-item').forEach(i => {
      i.classList.toggle('active', i.dataset.target === targetId);
    });
  }

  sidebar.querySelectorAll('.sidebar-item').forEach(item => {
    item.addEventListener('click', () => {
      setActiveSidebarItem(item.dataset.target);
      const target = document.getElementById(item.dataset.target);
      if (!target) return;
      const containerH = mainContent.clientHeight;
      const targetH    = target.offsetHeight;
      const targetTop  = target.getBoundingClientRect().top
                       - mainContent.getBoundingClientRect().top
                       + mainContent.scrollTop;
      mainContent.scrollTo({ top: targetTop - (containerH / 2) + (targetH / 2), behavior: 'smooth' });
    });
  });

  // Company header click → modal
  const allCompanies = [...COMPANIES.global, ...COMPANIES.korea];
  document.querySelectorAll('.company-header').forEach(el => {
    el.addEventListener('click', () => {
      const co = allCompanies.find(c => c.name === el.dataset.name);
      if (co) openModal(co);
    });
  });

  // IntersectionObserver → active sidebar
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) setActiveSidebarItem(entry.target.id);
    });
  }, { root: mainContent, threshold: 0.5 });

  document.querySelectorAll('.company').forEach(el => observer.observe(el));

  // Load highlights from report.json
  fetch('report.json').then(r => r.json()).then(d => {
    if (d.period) document.getElementById('meta').textContent = d.period + ' · Furiosa BD 참고용';

    function renderHighlights(items, containerId, isFuriosa) {
      const el = document.getElementById(containerId);
      if (!items || items.length === 0) {
        el.innerHTML = '<div style="font-size:0.82rem;color:var(--muted)">업데이트 없음</div>';
        return;
      }
      el.innerHTML = items.map(h => {
        const tag   = h.url ? 'a' : 'div';
        const attrs = h.url ? `href="${h.url}" target="_blank" rel="noopener"` : '';
        const company = (!isFuriosa && h.company) ? `<span class="hl-card-company">${h.company}</span>` : '';
        return `<${tag} class="hl-card${isFuriosa ? ' furiosa-card' : ''}${h.url ? ' linked' : ''}" ${attrs}>
          ${company}<span class="hl-card-text">${h.text}${h.url ? ' <span class="item-arrow">↗</span>' : ''}</span>
        </${tag}>`;
      }).join('');
    }

    renderHighlights(d.furiosa_highlights, 'furiosa-highlights', true);
    renderHighlights(d.highlights,         'competitor-highlights', false);
  }).catch(() => {});
</script>
</body>
</html>
