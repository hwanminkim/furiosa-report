<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Furiosa BD 경쟁사 동향 리포트</title>
<style>
  @font-face {
    font-family: 'ABCFavorit';
    src: url('assets/fonts/ABCFavorit-Regular.otf') format('opentype');
    font-weight: 400;
  }
  @font-face {
    font-family: 'ABCFavorit';
    src: url('assets/fonts/ABCFavorit-Medium.otf') format('opentype');
    font-weight: 500;
  }
  @font-face {
    font-family: 'ABCFavorit';
    src: url('assets/fonts/ABCFavorit-Bold.otf') format('opentype');
    font-weight: 700;
  }
  @font-face {
    font-family: 'ABCFavoritHangul';
    src: url('assets/fonts/ABCFavoritHangul-Regular.otf') format('opentype');
    font-weight: 400;
  }
  @font-face {
    font-family: 'ABCFavoritHangul';
    src: url('assets/fonts/ABCFavoritHangul-Medium.otf') format('opentype');
    font-weight: 500;
  }
  @font-face {
    font-family: 'ABCFavoritHangul';
    src: url('assets/fonts/ABCFavoritHangul-Bold.otf') format('opentype');
    font-weight: 700;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #E21500;
    --black: #0D0D0D;
    --dark: #161616;
    --card: #1A1A1A;
    --border: #2A2A2A;
    --text: #F0F0F0;
    --muted: #777;
    --header-h: 64px;
  }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: 'ABCFavoritHangul', 'ABCFavorit', -apple-system, sans-serif;
    background: var(--black);
    color: var(--text);
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    height: var(--header-h);
    flex-shrink: 0;
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--black);
    z-index: 10;
  }

  header a { display: block; line-height: 0; }
  header img { height: 26px; }

  .header-tag {
    font-family: 'ABCFavorit', sans-serif;
    font-size: 0.68rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 2px;
  }

  /* ── Layout ── */
  .layout {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  aside {
    width: 188px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 28px 0 40px;
  }

  .sidebar-label {
    font-family: 'ABCFavorit', sans-serif;
    font-size: 0.62rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0 20px 8px;
  }

  .sidebar-divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 16px 20px;
  }

  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 20px;
    font-size: 0.83rem;
    color: #999;
    cursor: pointer;
    transition: color 0.15s, background 0.1s;
    border-left: 2px solid transparent;
  }

  .sidebar-item:hover { color: var(--text); background: rgba(255,255,255,0.03); }

  .sidebar-item.active {
    color: var(--text);
    border-left-color: var(--red);
    background: rgba(226,21,0,0.06);
  }

  .sidebar-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--red);
    flex-shrink: 0;
  }

  .sidebar-dot.none { background: #3A3A3A; }

  /* ── Main content ── */
  main {
    flex: 1;
    overflow-y: auto;
    padding: 36px 40px 80px;
    scroll-behavior: smooth;
  }

  /* ── Page header ── */
  .page-eyebrow {
    font-family: 'ABCFavorit', sans-serif;
    font-size: 0.68rem;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--red);
    margin-bottom: 10px;
  }

  h1 {
    font-size: 1.6rem;
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 6px;
  }

  .meta {
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 36px;
    padding-bottom: 28px;
    border-bottom: 1px solid var(--border);
  }

  /* ── Banner carousel ── */
  .banner-wrap {
    position: relative;
    margin-bottom: 36px;
    border-radius: 6px;
    overflow: hidden;
    background: var(--card);
    border: 1px solid var(--border);
    min-height: 148px;
  }

  .banner-slides {
    position: relative;
    width: 100%;
    height: 100%;
  }

  .banner-slide {
    position: absolute;
    inset: 0;
    padding: 24px 56px 48px 24px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s ease;
    text-decoration: none;
    color: inherit;
  }

  .banner-slide.active {
    opacity: 1;
    pointer-events: auto;
    position: relative;
  }

  .banner-slide.linked:hover { background: rgba(255,255,255,0.02); }

  .banner-badge {
    font-family: 'ABCFavorit', sans-serif;
    font-size: 0.62rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--red);
    background: rgba(226,21,0,0.12);
    padding: 3px 8px;
    border-radius: 2px;
    align-self: flex-start;
  }

  .banner-eyebrow {
    font-family: 'ABCFavorit', sans-serif;
    font-size: 0.6rem;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .banner-text {
    font-size: 0.95rem;
    font-weight: 500;
    line-height: 1.55;
    color: #E0E0E0;
    max-width: 680px;
  }

  .banner-link-hint {
    font-size: 0.72rem;
    color: var(--muted);
  }

  /* nav arrows */
  .banner-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--muted);
    font-size: 1rem;
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 2;
    transition: border-color 0.15s, color 0.15s;
  }

  .banner-btn:hover { border-color: #555; color: var(--text); }
  .banner-prev { right: 36px; }
  .banner-next { right: 4px; }

  /* dots + progress */
  .banner-footer {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 24px 10px;
  }

  .banner-dots {
    display: flex;
    gap: 5px;
  }

  .banner-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #3A3A3A;
    cursor: pointer;
    transition: background 0.2s;
  }

  .banner-dot.active { background: var(--red); }

  .banner-progress-bar {
    flex: 1;
    height: 1px;
    background: #2A2A2A;
    border-radius: 1px;
    overflow: hidden;
  }

  .banner-progress-fill {
    height: 100%;
    background: var(--red);
    width: 0%;
    transition: width linear;
  }

  /* ── Section divider ── */
  .section-label {
    font-family: 'ABCFavorit', sans-serif;
    font-size: 0.62rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  /* ── Company cards ── */
  .company {
    border: 1px solid var(--border);
    border-radius: 4px;
    margin-bottom: 10px;
    overflow: hidden;
    background: var(--card);
    transition: border-color 0.15s;
    scroll-margin-top: 20px;
  }

  .company.in-view { border-color: #333; }

  .company-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
  }

  .company-header:hover .company-name { color: #fff; }

  .company-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--red);
    flex-shrink: 0;
  }

  .company-dot.no-update { background: #3A3A3A; }

  .company-name {
    font-size: 0.9rem;
    font-weight: 600;
    transition: color 0.15s;
  }

  .header-chevron {
    margin-left: auto;
    font-size: 0.65rem;
    color: var(--muted);
  }

  .company-body { padding: 14px 18px; }

  .item {
    font-size: 0.86rem;
    color: #C0C0C0;
    line-height: 1.6;
    padding: 4px 0 4px 14px;
    position: relative;
  }

  .item::before {
    content: '';
    position: absolute;
    left: 0;
    top: 12px;
    width: 4px;
    height: 1px;
    background: var(--muted);
  }

  .item a {
    color: inherit;
    text-decoration: none;
    border-bottom: 1px solid #3A3A3A;
    transition: color 0.15s, border-color 0.15s;
  }

  .item a:hover { color: #fff; border-bottom-color: var(--red); }

  .item-arrow { font-size: 0.68rem; color: var(--muted); margin-left: 3px; }

  .watch {
    margin-top: 12px;
    padding: 9px 12px;
    background: rgba(226,21,0,0.06);
    border-left: 2px solid var(--red);
    border-radius: 2px;
    font-size: 0.8rem;
    color: #C0C0C0;
    line-height: 1.6;
  }

  .watch-label {
    font-family: 'ABCFavorit', sans-serif;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--red);
    display: block;
    margin-bottom: 3px;
  }

  .no-update-text { font-size: 0.83rem; color: var(--muted); }

  /* ── Modal ── */
  .modal-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }

  .modal-backdrop.open { display: flex; }

  .modal {
    background: #1E1E1E;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 24px;
    width: 300px;
    box-shadow: 0 24px 48px rgba(0,0,0,0.5);
  }

  .modal-title {
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 5px;
  }

  .modal-company { font-size: 1.1rem; font-weight: 700; margin-bottom: 18px; }

  .modal-links { display: flex; flex-direction: column; gap: 8px; }

  .modal-link {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 14px;
    border: 1px solid #333;
    border-radius: 4px;
    text-decoration: none;
    color: var(--text);
    font-size: 0.86rem;
    transition: border-color 0.15s, background 0.15s;
  }

  .modal-link:hover { border-color: var(--red); background: rgba(226,21,0,0.06); }
  .modal-link-icon { font-size: 1rem; width: 20px; text-align: center; }
  .modal-link-label { flex: 1; }
  .modal-link-arrow { font-size: 0.68rem; color: var(--muted); }

  .modal-close {
    display: block;
    margin-top: 14px;
    width: 100%;
    padding: 8px;
    background: none;
    border: 1px solid #333;
    border-radius: 4px;
    color: var(--muted);
    font-size: 0.78rem;
    cursor: pointer;
    font-family: inherit;
    transition: border-color 0.15s, color 0.15s;
  }

  .modal-close:hover { border-color: #555; color: var(--text); }
</style>
</head>
<body>

<header>
  <a href="index.html"><img src="assets/img/Furiosa_AI_h_w.png" alt="Furiosa AI"></a>
  <span class="header-tag">BD Internal</span>
</header>

<div class="layout">
  <aside id="sidebar"></aside>

  <main id="main-content">
    <div class="page-eyebrow">Competitive Intelligence</div>
    <h1>경쟁사 동향 리포트</h1>
    <div class="meta" id="meta">불러오는 중...</div>

    <div class="section-label" style="margin-bottom:10px;">이번 주 하이라이트</div>
    <div class="banner-wrap" id="banner-wrap">
      <div class="banner-slides" id="banner-slides"></div>
      <button class="banner-btn banner-prev" id="banner-prev">‹</button>
      <button class="banner-btn banner-next" id="banner-next">›</button>
      <div class="banner-footer">
        <div class="banner-dots" id="banner-dots"></div>
        <div class="banner-progress-bar"><div class="banner-progress-fill" id="banner-fill"></div></div>
      </div>
    </div>

    <div class="section-label">회사별 동향</div>
    <div id="companies"></div>
  </main>
</div>

<!-- Modal -->
<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal">
    <div class="modal-title">바로가기</div>
    <div class="modal-company" id="modal-company-name"></div>
    <div class="modal-links">
      <a class="modal-link" id="modal-website" href="#" target="_blank" rel="noopener">
        <span class="modal-link-icon">🌐</span>
        <span class="modal-link-label">공식 웹사이트</span>
        <span class="modal-link-arrow">↗</span>
      </a>
      <a class="modal-link" id="modal-blog" href="#" target="_blank" rel="noopener">
        <span class="modal-link-icon">📝</span>
        <span class="modal-link-label">블로그</span>
        <span class="modal-link-arrow">↗</span>
      </a>
    </div>
    <button class="modal-close" id="modal-close">닫기</button>
  </div>
</div>

<script>
  // Modal
  const backdrop = document.getElementById('modal-backdrop');
  document.getElementById('modal-close').addEventListener('click', () => backdrop.classList.remove('open'));
  backdrop.addEventListener('click', e => { if (e.target === backdrop) backdrop.classList.remove('open'); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') backdrop.classList.remove('open'); });

  function openModal(name, website, blog) {
    document.getElementById('modal-company-name').textContent = name;
    document.getElementById('modal-website').href = website;
    document.getElementById('modal-blog').href = blog;
    backdrop.classList.add('open');
  }

  // Render
  fetch('report.json').then(r => r.json()).then(d => {
    document.getElementById('meta').textContent = d.period + ' · Furiosa BD 참고용';

    // Banner carousel
    const highlights = d.highlights || [];
    const slidesEl = document.getElementById('banner-slides');
    const dotsEl   = document.getElementById('banner-dots');
    const fillEl   = document.getElementById('banner-fill');
    let current = 0, timer = null, fillTimer = null;
    const INTERVAL = 5000;

    slidesEl.innerHTML = highlights.map((h, i) => {
      const tag   = h.url ? 'a' : 'div';
      const attrs = h.url ? `href="${h.url}" target="_blank" rel="noopener"` : '';
      return `<${tag} class="banner-slide${i === 0 ? ' active' : ''}${h.url ? ' linked' : ''}" ${attrs}>
        <span class="banner-eyebrow">이번 주 하이라이트</span>
        <span class="banner-badge">${h.company}</span>
        <span class="banner-text">${h.text}</span>
        ${h.url ? '<span class="banner-link-hint">↗ 기사 보기</span>' : ''}
      </${tag}>`;
    }).join('');

    dotsEl.innerHTML = highlights.map((_, i) =>
      `<div class="banner-dot${i === 0 ? ' active' : ''}" data-i="${i}"></div>`
    ).join('');

    function goTo(idx) {
      const slides = slidesEl.querySelectorAll('.banner-slide');
      const dots   = dotsEl.querySelectorAll('.banner-dot');
      slides[current].classList.remove('active');
      dots[current].classList.remove('active');
      current = (idx + highlights.length) % highlights.length;
      slides[current].classList.add('active');
      dots[current].classList.add('active');
      startFill();
    }

    function startFill() {
      clearInterval(fillTimer);
      fillEl.style.transition = 'none';
      fillEl.style.width = '0%';
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          fillEl.style.transition = `width ${INTERVAL}ms linear`;
          fillEl.style.width = '100%';
        });
      });
    }

    function startAuto() {
      clearInterval(timer);
      timer = setInterval(() => goTo(current + 1), INTERVAL);
    }

    dotsEl.querySelectorAll('.banner-dot').forEach(dot => {
      dot.addEventListener('click', () => { goTo(+dot.dataset.i); startAuto(); });
    });
    document.getElementById('banner-prev').addEventListener('click', () => { goTo(current - 1); startAuto(); });
    document.getElementById('banner-next').addEventListener('click', () => { goTo(current + 1); startAuto(); });

    document.getElementById('banner-wrap').addEventListener('mouseenter', () => clearInterval(timer));
    document.getElementById('banner-wrap').addEventListener('mouseleave', startAuto);

    if (highlights.length > 1) { startFill(); startAuto(); }

    // Sidebar highlights items
    const hlEl = document.getElementById('banner-wrap');
    hlEl.id = 'highlights';

    // Companies
    document.getElementById('companies').innerHTML = d.companies.map(c => `
      <div class="company" id="co-${c.name}">
        <div class="company-header" data-name="${c.name}" data-website="${c.website||''}" data-blog="${c.blog||''}">
          <div class="company-dot${c.no_update ? ' no-update' : ''}"></div>
          <span class="company-name">${c.name}</span>
          <span class="header-chevron">⊕</span>
        </div>
        <div class="company-body">
          ${c.no_update
            ? `<div class="no-update-text">특이사항 없음</div>`
            : `${c.items.map(i => {
                const text = typeof i === 'object' ? i.text : i;
                const url  = typeof i === 'object' ? i.url  : '';
                return `<div class="item">${url
                  ? `<a href="${url}" target="_blank" rel="noopener">${text}<span class="item-arrow">↗</span></a>`
                  : text}</div>`;
              }).join('')}
              <div class="watch"><span class="watch-label">BD Watch</span>${c.watch}</div>`
          }
        </div>
      </div>
    `).join('');

    // Sidebar
    const sidebar = document.getElementById('sidebar');
    sidebar.innerHTML = `
      <div class="sidebar-label">이번 주 하이라이트</div>
      ${d.highlights.map(h => `
        <div class="sidebar-item" data-target="highlights">
          <span class="sidebar-dot"></span>${h.company}
        </div>`).join('')}
      <hr class="sidebar-divider">
      <div class="sidebar-label">회사별 동향</div>
      ${d.companies.map(c => `
        <div class="sidebar-item" data-target="co-${c.name}">
          <span class="sidebar-dot${c.no_update ? ' none' : ''}"></span>${c.name}
        </div>`).join('')}
    `;

    // Sidebar click → scroll
    sidebar.querySelectorAll('.sidebar-item').forEach(item => {
      item.addEventListener('click', () => {
        const target = document.getElementById(item.dataset.target) ||
                       document.getElementById('highlights');
        if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
    });

    // Company header → modal
    document.querySelectorAll('.company-header').forEach(el => {
      el.addEventListener('click', () => openModal(el.dataset.name, el.dataset.website, el.dataset.blog));
    });

    // IntersectionObserver → active sidebar item
    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const id = entry.target.id;
          sidebar.querySelectorAll('.sidebar-item').forEach(item => {
            item.classList.toggle('active', item.dataset.target === id);
          });
        }
      });
    }, { root: document.getElementById('main-content'), threshold: 0.4 });

    document.querySelectorAll('.company').forEach(el => observer.observe(el));
    const hlEl2 = document.getElementById('highlights');
    if (hlEl2) observer.observe(hlEl2);

  }).catch(() => {
    document.getElementById('meta').textContent = '리포트를 불러올 수 없습니다.';
  });
</script>
</body>
</html>
