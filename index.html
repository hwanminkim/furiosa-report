<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Furiosa BD 경쟁사 동향 리포트</title>
<style>
  @font-face {
    font-family: 'ABCFavorit';
    src: url('assets/fonts/ABCFavorit-Regular.otf') format('opentype');
    font-weight: 400;
  }
  @font-face {
    font-family: 'ABCFavorit';
    src: url('assets/fonts/ABCFavorit-Medium.otf') format('opentype');
    font-weight: 500;
  }
  @font-face {
    font-family: 'ABCFavorit';
    src: url('assets/fonts/ABCFavorit-Bold.otf') format('opentype');
    font-weight: 700;
  }
  @font-face {
    font-family: 'ABCFavoritHangul';
    src: url('assets/fonts/ABCFavoritHangul-Regular.otf') format('opentype');
    font-weight: 400;
  }
  @font-face {
    font-family: 'ABCFavoritHangul';
    src: url('assets/fonts/ABCFavoritHangul-Medium.otf') format('opentype');
    font-weight: 500;
  }
  @font-face {
    font-family: 'ABCFavoritHangul';
    src: url('assets/fonts/ABCFavoritHangul-Bold.otf') format('opentype');
    font-weight: 700;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #E21500;
    --black: #0D0D0D;
    --dark: #161616;
    --card: #1A1A1A;
    --border: #2A2A2A;
    --text: #F0F0F0;
    --muted: #777;
    --header-h: 64px;
  }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: 'ABCFavoritHangul', 'ABCFavorit', -apple-system, sans-serif;
    background: var(--black);
    color: var(--text);
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    height: var(--header-h);
    flex-shrink: 0;
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--black);
    z-index: 10;
  }

  header a { display: block; line-height: 0; }
  header img { height: 26px; }

  .header-tag {
    font-family: 'ABCFavorit', sans-serif;
    font-size: 0.68rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 2px;
  }

  /* ── Layout ── */
  .layout {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  aside {
    width: 188px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 28px 0 40px;
  }

  .sidebar-label {
    font-family: 'ABCFavorit', sans-serif;
    font-size: 0.62rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0 20px 8px;
  }

  .sidebar-divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 16px 20px;
  }

  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 20px;
    font-size: 0.83rem;
    color: #999;
    cursor: pointer;
    transition: color 0.15s, background 0.1s;
    border-left: 2px solid transparent;
  }

  .sidebar-item:hover { color: var(--text); background: rgba(255,255,255,0.03); }

  .sidebar-item.active {
    color: var(--text);
    border-left-color: var(--red);
    background: rgba(226,21,0,0.06);
  }

  .sidebar-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--red);
    flex-shrink: 0;
  }

  .sidebar-dot.none { background: #3A3A3A; }

  /* ── Main content ── */
  main {
    flex: 1;
    overflow-y: auto;
    padding: 36px 40px 80px;
    scroll-behavior: smooth;
  }

  /* ── Page header ── */
  .page-eyebrow {
    font-family: 'ABCFavorit', sans-serif;
    font-size: 0.68rem;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--red);
    margin-bottom: 10px;
  }

  h1 {
    font-size: 1.6rem;
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 6px;
  }

  .meta {
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 36px;
    padding-bottom: 28px;
    border-bottom: 1px solid var(--border);
  }

  /* ── Top 2-col highlight grid ── */
  .top-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 36px;
  }

  .highlight-badge {
    font-family: 'ABCFavorit', sans-serif;
    font-size: 0.62rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--red);
    background: rgba(226,21,0,0.12);
    padding: 2px 7px;
    border-radius: 2px;
    display: inline-block;
    margin-bottom: 8px;
  }

  .hl-card {
    display: block;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 14px 16px;
    margin-bottom: 10px;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.15s;
  }

  .hl-card.linked:hover { border-color: var(--red); }

  .hl-card-text {
    font-size: 0.84rem;
    color: #C8C8C8;
    line-height: 1.55;
  }

  /* Furiosa card: subtle left accent */
  .furiosa-card {
    border-left: 2px solid var(--red);
  }

  /* ── Section divider ── */
  .section-label {
    font-family: 'ABCFavorit', sans-serif;
    font-size: 0.62rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }


  /* ── Company cards ── */
  .company {
    border: 1px solid var(--border);
    border-radius: 4px;
    margin-bottom: 10px;
    overflow: hidden;
    background: var(--card);
    transition: border-color 0.15s;
    scroll-margin-top: 20px;
  }

  .company.in-view { border-color: #333; }

  .company-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
  }

  .company-header:hover .company-name { color: #fff; }

  .company-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--red);
    flex-shrink: 0;
  }

  .company-dot.no-update { background: #3A3A3A; }

  .company-name {
    font-size: 0.9rem;
    font-weight: 600;
    transition: color 0.15s;
  }

  .header-chevron {
    margin-left: auto;
    font-size: 0.65rem;
    color: var(--muted);
  }

  .company-body { padding: 14px 18px; }

  .item {
    font-size: 0.86rem;
    color: #C0C0C0;
    line-height: 1.6;
    padding: 4px 0 4px 14px;
    position: relative;
  }

  .item::before {
    content: '';
    position: absolute;
    left: 0;
    top: 12px;
    width: 4px;
    height: 1px;
    background: var(--muted);
  }

  .item a {
    color: inherit;
    text-decoration: none;
    border-bottom: 1px solid #3A3A3A;
    transition: color 0.15s, border-color 0.15s;
  }

  .item a:hover { color: #fff; border-bottom-color: var(--red); }

  .item-arrow { font-size: 0.68rem; color: var(--muted); margin-left: 3px; }

  .watch {
    margin-top: 12px;
    padding: 9px 12px;
    background: rgba(226,21,0,0.06);
    border-left: 2px solid var(--red);
    border-radius: 2px;
    font-size: 0.8rem;
    color: #C0C0C0;
    line-height: 1.6;
  }

  .watch-label {
    font-family: 'ABCFavorit', sans-serif;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--red);
    display: block;
    margin-bottom: 3px;
  }

  .no-update-text { font-size: 0.83rem; color: var(--muted); }

  /* ── Modal ── */
  .modal-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }

  .modal-backdrop.open { display: flex; }

  .modal {
    background: #1E1E1E;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 24px;
    width: 300px;
    box-shadow: 0 24px 48px rgba(0,0,0,0.5);
  }

  .modal-title {
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 5px;
  }

  .modal-company { font-size: 1.1rem; font-weight: 700; margin-bottom: 18px; }

  .modal-links { display: flex; flex-direction: column; gap: 8px; }

  .modal-link {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 14px;
    border: 1px solid #333;
    border-radius: 4px;
    text-decoration: none;
    color: var(--text);
    font-size: 0.86rem;
    transition: border-color 0.15s, background 0.15s;
  }

  .modal-link:hover { border-color: var(--red); background: rgba(226,21,0,0.06); }
  .modal-link-icon { font-size: 1rem; width: 20px; text-align: center; }
  .modal-link-label { flex: 1; }
  .modal-link-arrow { font-size: 0.68rem; color: var(--muted); }

  .modal-close {
    display: block;
    margin-top: 14px;
    width: 100%;
    padding: 8px;
    background: none;
    border: 1px solid #333;
    border-radius: 4px;
    color: var(--muted);
    font-size: 0.78rem;
    cursor: pointer;
    font-family: inherit;
    transition: border-color 0.15s, color 0.15s;
  }

  .modal-close:hover { border-color: #555; color: var(--text); }

  /* ── Article detail modal ── */
  .detail-modal {
    background: #1A1A1A;
    border: 1px solid #333;
    border-radius: 8px;
    width: min(720px, 92vw);
    max-height: 80vh;
    display: flex;
    flex-direction: column;
    box-shadow: 0 32px 64px rgba(0,0,0,0.6);
  }

  .detail-modal-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid #2A2A2A;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .detail-modal-company {
    font-size: 1rem;
    font-weight: 700;
    flex: 1;
  }

  .detail-modal-links {
    display: flex;
    gap: 8px;
  }

  .detail-modal-link {
    font-size: 0.72rem;
    color: var(--muted);
    text-decoration: none;
    border: 1px solid #333;
    padding: 3px 9px;
    border-radius: 3px;
    transition: border-color 0.15s, color 0.15s;
  }

  .detail-modal-link:hover { border-color: #555; color: var(--text); }

  .detail-modal-close {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 1.1rem;
    cursor: pointer;
    padding: 4px 8px;
    transition: color 0.15s;
  }

  .detail-modal-close:hover { color: var(--text); }

  .detail-modal-body {
    overflow-y: auto;
    padding: 8px 0;
  }

  .detail-article {
    padding: 16px 24px;
    border-bottom: 1px solid #222;
  }

  .detail-article:last-child { border-bottom: none; }

  .detail-article-title {
    font-size: 0.88rem;
    font-weight: 600;
    color: #E8E8E8;
    margin-bottom: 8px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }

  .detail-article-link {
    font-family: 'ABCFavorit', sans-serif;
    font-size: 0.65rem;
    color: var(--muted);
    text-decoration: none;
    border: 1px solid #333;
    padding: 2px 8px;
    border-radius: 3px;
    white-space: nowrap;
    flex-shrink: 0;
    transition: border-color 0.15s, color 0.15s;
  }

  .detail-article-link:hover { border-color: var(--red); color: var(--text); }

  .detail-article-summary {
    font-size: 0.83rem;
    color: #B8B8B8;
    line-height: 1.6;
    margin-bottom: 10px;
  }

  .detail-bd-watch {
    font-size: 0.8rem;
    color: #C0C0C0;
    line-height: 1.55;
    padding: 8px 12px;
    background: rgba(226,21,0,0.06);
    border-left: 2px solid var(--red);
    border-radius: 2px;
  }

  .detail-bd-label {
    font-family: 'ABCFavorit', sans-serif;
    font-size: 0.62rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--red);
    display: block;
    margin-bottom: 3px;
  }
</style>
</head>
<body>

<header>
  <a href="index.html"><img src="assets/img/Furiosa_AI_h_w.png" alt="Furiosa AI"></a>
  <span class="header-tag">BD Internal</span>
</header>

<div class="layout">
  <aside id="sidebar"></aside>

  <main id="main-content">
    <div class="page-eyebrow">Competitive Intelligence</div>
    <h1>경쟁사 동향 리포트</h1>
    <div class="meta" id="meta">불러오는 중...</div>

    <div class="top-grid" id="highlights">
      <div>
        <div class="section-label">Furiosa 주간 하이라이트</div>
        <div id="furiosa-highlights"></div>
      </div>
      <div>
        <div class="section-label">이번 주 경쟁사 하이라이트</div>
        <div id="competitor-highlights"></div>
      </div>
    </div>

    <div class="section-label">회사별 동향 — Global</div>
    <div id="companies-global"></div>
    <div class="section-label" style="margin-top:28px;">회사별 동향 — Korea</div>
    <div id="companies-korea"></div>
  </main>
</div>

<!-- Article detail modal -->
<div class="modal-backdrop" id="detail-backdrop">
  <div class="detail-modal">
    <div class="detail-modal-header">
      <span class="highlight-badge" id="detail-badge"></span>
      <span class="detail-modal-company" id="detail-company"></span>
      <div class="detail-modal-links">
        <a class="detail-modal-link" id="detail-website" href="#" target="_blank" rel="noopener">🌐 웹사이트</a>
        <a class="detail-modal-link" id="detail-blog" href="#" target="_blank" rel="noopener">📝 블로그</a>
      </div>
      <button class="detail-modal-close" id="detail-close">✕</button>
    </div>
    <div class="detail-modal-body" id="detail-body"></div>
  </div>
</div>

<script>
  // Detail modal
  const detailBackdrop = document.getElementById('detail-backdrop');
  document.getElementById('detail-close').addEventListener('click', () => detailBackdrop.classList.remove('open'));
  detailBackdrop.addEventListener('click', e => { if (e.target === detailBackdrop) detailBackdrop.classList.remove('open'); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') detailBackdrop.classList.remove('open'); });

  function openDetailModal(company) {
    document.getElementById('detail-badge').textContent  = company.name;
    document.getElementById('detail-company').textContent = company.name;
    document.getElementById('detail-website').href = company.website || '#';
    document.getElementById('detail-blog').href    = company.blog    || '#';

    const items = (company.items || []).filter(i => typeof i === 'object');
    document.getElementById('detail-body').innerHTML = items.length === 0
      ? '<div style="padding:24px;color:var(--muted);font-size:0.85rem;">최근 기사 없음</div>'
      : items.map(item => `
          <div class="detail-article">
            <div class="detail-article-title">
              <span>${item.text || ''}</span>
              ${item.url ? `<a class="detail-article-link" href="${item.url}" target="_blank" rel="noopener">기사 보기 ↗</a>` : ''}
            </div>
            ${item.summary ? `<div class="detail-article-summary">${item.summary}</div>` : ''}
            ${item.bd_watch ? `<div class="detail-bd-watch"><span class="detail-bd-label">BD Watch</span>${item.bd_watch}</div>` : ''}
          </div>`).join('');

    detailBackdrop.classList.add('open');
  }

  // Render
  fetch('report.json').then(r => r.json()).then(d => {
    document.getElementById('meta').textContent = d.period + ' · Furiosa BD 참고용';

    // Helper: render highlight cards
    function renderCards(items, containerId, extraClass) {
      document.getElementById(containerId).innerHTML = (items || []).map(h => {
        const tag   = h.url ? 'a' : 'div';
        const attrs = h.url ? `href="${h.url}" target="_blank" rel="noopener"` : '';
        const badge = h.company ? `<span class="highlight-badge">${h.company}</span><br>` : '';
        return `<${tag} class="hl-card${extraClass}${h.url ? ' linked' : ''}" ${attrs}>
          ${badge}<span class="hl-card-text">${h.text}${h.url ? ' <span class="item-arrow">↗</span>' : ''}</span>
        </${tag}>`;
      }).join('') || '<div style="font-size:0.82rem;color:var(--muted)">업데이트 없음</div>';
    }

    renderCards(d.furiosa_highlights || [], 'furiosa-highlights', ' furiosa-card');
    renderCards(d.highlights        || [], 'competitor-highlights', '');

    // Companies
    const ALL_COMPANIES_DATA = d.companies;

    function renderCompany(c) {
      return `
        <div class="company" id="co-${c.name}">
          <div class="company-header" data-idx="${ALL_COMPANIES_DATA.findIndex(x => x.name === c.name)}">
            <div class="company-dot${c.no_update ? ' no-update' : ''}"></div>
            <span class="company-name">${c.name}</span>
            <span class="header-chevron">⊕</span>
          </div>
          <div class="company-body">
            ${c.no_update
              ? `<div class="no-update-text">최근 기사 없음</div>`
              : `${(c.items||[]).map(i => {
                  const text = typeof i === 'object' ? i.text : i;
                  return `<div class="item">${text}</div>`;
                }).join('')}`
            }
          </div>
        </div>`;
    }

    const globalCos = d.companies.filter(c => c.region === 'global' || !c.region);
    const koreaCos  = d.companies.filter(c => c.region === 'korea');
    document.getElementById('companies-global').innerHTML = globalCos.map(renderCompany).join('');
    document.getElementById('companies-korea').innerHTML  = koreaCos.map(renderCompany).join('');

    // Sidebar
    const sidebar = document.getElementById('sidebar');
    sidebar.innerHTML = `
      <div class="sidebar-item" data-target="highlights" style="margin-bottom:4px;">
        <span class="sidebar-dot"></span>이번 주 하이라이트
      </div>
      <hr class="sidebar-divider">
      <div class="sidebar-label">Global</div>
      ${globalCos.map(c => `
        <div class="sidebar-item" data-target="co-${c.name}">
          <span class="sidebar-dot${c.no_update ? ' none' : ''}"></span>${c.name}
        </div>`).join('')}
      <hr class="sidebar-divider">
      <div class="sidebar-label">Korea</div>
      ${koreaCos.map(c => `
        <div class="sidebar-item" data-target="co-${c.name}">
          <span class="sidebar-dot${c.no_update ? ' none' : ''}"></span>${c.name}
        </div>`).join('')}
    `;

    // Sidebar click → scroll to center
    const mainContent = document.getElementById('main-content');
    sidebar.querySelectorAll('.sidebar-item').forEach(item => {
      item.addEventListener('click', () => {
        const target = document.getElementById(item.dataset.target) ||
                       document.getElementById('highlights');
        if (!target) return;
        const containerH = mainContent.clientHeight;
        const targetH    = target.offsetHeight;
        const targetTop  = target.getBoundingClientRect().top
                         - mainContent.getBoundingClientRect().top
                         + mainContent.scrollTop;
        mainContent.scrollTo({
          top: targetTop - (containerH / 2) + (targetH / 2),
          behavior: 'smooth'
        });
      });
    });

    // Company header → detail modal
    document.querySelectorAll('.company-header').forEach(el => {
      el.addEventListener('click', () => {
        const idx = parseInt(el.dataset.idx);
        if (!isNaN(idx)) openDetailModal(ALL_COMPANIES_DATA[idx]);
      });
    });

    // IntersectionObserver → active sidebar item
    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const id = entry.target.id;
          sidebar.querySelectorAll('.sidebar-item').forEach(item => {
            item.classList.toggle('active', item.dataset.target === id);
          });
        }
      });
    }, { root: document.getElementById('main-content'), threshold: 0.4 });

    document.querySelectorAll('#companies-global .company, #companies-korea .company').forEach(el => observer.observe(el));
    const hlEl2 = document.getElementById('highlights');
    if (hlEl2) observer.observe(hlEl2);

  }).catch(() => {
    document.getElementById('meta').textContent = '리포트를 불러올 수 없습니다.';
  });
</script>
</body>
</html>
