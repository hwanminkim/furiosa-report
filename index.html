<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Furiosa BD 경쟁사 동향 리포트</title>
<style>
  @font-face {
    font-family: 'ABCFavorit';
    src: url('assets/fonts/ABCFavorit-Regular.otf') format('opentype');
    font-weight: 400;
  }
  @font-face {
    font-family: 'ABCFavorit';
    src: url('assets/fonts/ABCFavorit-Medium.otf') format('opentype');
    font-weight: 500;
  }
  @font-face {
    font-family: 'ABCFavorit';
    src: url('assets/fonts/ABCFavorit-Bold.otf') format('opentype');
    font-weight: 700;
  }
  @font-face {
    font-family: 'ABCFavoritHangul';
    src: url('assets/fonts/ABCFavoritHangul-Regular.otf') format('opentype');
    font-weight: 400;
  }
  @font-face {
    font-family: 'ABCFavoritHangul';
    src: url('assets/fonts/ABCFavoritHangul-Medium.otf') format('opentype');
    font-weight: 500;
  }
  @font-face {
    font-family: 'ABCFavoritHangul';
    src: url('assets/fonts/ABCFavoritHangul-Bold.otf') format('opentype');
    font-weight: 700;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #E21500;
    --black: #0D0D0D;
    --dark: #1A1A1A;
    --border: #2A2A2A;
    --text: #F0F0F0;
    --muted: #888;
  }

  body {
    font-family: 'ABCFavoritHangul', 'ABCFavorit', -apple-system, sans-serif;
    background: var(--black);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 20px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  header img {
    height: 28px;
    display: block;
  }

  .header-tag {
    font-family: 'ABCFavorit', sans-serif;
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 2px;
  }

  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 48px 40px 80px;
  }

  .page-title {
    font-family: 'ABCFavorit', sans-serif;
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--red);
    margin-bottom: 12px;
  }

  h1 {
    font-size: 1.8rem;
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 8px;
  }

  .meta {
    font-size: 0.82rem;
    color: var(--muted);
    margin-bottom: 48px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }

  .company {
    border: 1px solid var(--border);
    border-radius: 4px;
    margin-bottom: 12px;
    overflow: hidden;
    background: var(--dark);
    transition: border-color 0.15s;
  }

  .company:hover {
    border-color: #3A3A3A;
  }

  .company-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }

  .company-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--red);
    flex-shrink: 0;
  }

  .company-dot.no-update {
    background: var(--border);
  }

  .company h2 {
    font-size: 0.92rem;
    font-weight: 600;
    letter-spacing: 0.01em;
  }

  .company-body {
    padding: 16px 20px;
  }

  .item {
    font-size: 0.88rem;
    color: #C8C8C8;
    line-height: 1.6;
    padding: 5px 0;
    padding-left: 14px;
    position: relative;
  }

  .item::before {
    content: '';
    position: absolute;
    left: 0;
    top: 13px;
    width: 4px;
    height: 1px;
    background: var(--muted);
  }

  .item a {
    color: inherit;
    text-decoration: none;
    border-bottom: 1px solid #444;
    transition: color 0.15s, border-color 0.15s;
  }

  .item a:hover {
    color: #fff;
    border-bottom-color: var(--red);
  }

  .item-arrow {
    font-size: 0.7rem;
    color: var(--muted);
    margin-left: 4px;
    vertical-align: middle;
  }

  .watch {
    margin-top: 14px;
    padding: 10px 14px;
    background: rgba(226, 21, 0, 0.07);
    border-left: 2px solid var(--red);
    border-radius: 2px;
    font-size: 0.82rem;
    color: #C8C8C8;
    line-height: 1.6;
  }

  .watch-label {
    font-family: 'ABCFavorit', sans-serif;
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--red);
    display: block;
    margin-bottom: 4px;
  }

  .no-update-text {
    font-size: 0.85rem;
    color: var(--muted);
  }

  .company-header {
    cursor: pointer;
    user-select: none;
  }

  .company-header:hover .company-name {
    color: #fff;
  }

  .company-name {
    transition: color 0.15s;
  }

  .header-chevron {
    margin-left: auto;
    font-size: 0.65rem;
    color: var(--muted);
  }

  /* Modal */
  .modal-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }

  .modal-backdrop.open {
    display: flex;
  }

  .modal {
    background: #1E1E1E;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 24px;
    width: 300px;
    box-shadow: 0 24px 48px rgba(0,0,0,0.5);
  }

  .modal-title {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .modal-company {
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 20px;
  }

  .modal-links {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .modal-link {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    border: 1px solid #333;
    border-radius: 4px;
    text-decoration: none;
    color: var(--text);
    font-size: 0.88rem;
    transition: border-color 0.15s, background 0.15s;
  }

  .modal-link:hover {
    border-color: var(--red);
    background: rgba(226,21,0,0.06);
  }

  .modal-link-icon {
    font-size: 1rem;
    width: 20px;
    text-align: center;
  }

  .modal-link-label {
    flex: 1;
  }

  .modal-link-arrow {
    font-size: 0.7rem;
    color: var(--muted);
  }

  .modal-close {
    display: block;
    margin-top: 16px;
    width: 100%;
    padding: 8px;
    background: none;
    border: 1px solid #333;
    border-radius: 4px;
    color: var(--muted);
    font-size: 0.8rem;
    cursor: pointer;
    font-family: inherit;
    transition: border-color 0.15s, color 0.15s;
  }

  .modal-close:hover {
    border-color: #555;
    color: var(--text);
  }
</style>
</head>
<body>

<header>
  <a href="index.html" style="display:block;line-height:0;">
    <img src="assets/img/Furiosa_AI_h_w.png" alt="Furiosa AI">
  </a>
  <span class="header-tag">BD Internal</span>
</header>

<!-- Company modal -->
<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal">
    <div class="modal-title">바로가기</div>
    <div class="modal-company" id="modal-company-name"></div>
    <div class="modal-links">
      <a class="modal-link" id="modal-website" href="#" target="_blank" rel="noopener">
        <span class="modal-link-icon">🌐</span>
        <span class="modal-link-label">공식 웹사이트</span>
        <span class="modal-link-arrow">↗</span>
      </a>
      <a class="modal-link" id="modal-blog" href="#" target="_blank" rel="noopener">
        <span class="modal-link-icon">📝</span>
        <span class="modal-link-label">블로그</span>
        <span class="modal-link-arrow">↗</span>
      </a>
    </div>
    <button class="modal-close" id="modal-close">닫기</button>
  </div>
</div>

<main>
  <div class="page-title">Competitive Intelligence</div>
  <h1>경쟁사 동향 리포트</h1>
  <div class="meta" id="meta">아직 리포트가 없습니다.</div>
  <div id="content"></div>
</main>

<script>
  // Modal
  const backdrop = document.getElementById('modal-backdrop');
  const modalName = document.getElementById('modal-company-name');
  const modalWebsite = document.getElementById('modal-website');
  const modalBlog = document.getElementById('modal-blog');

  function openModal(name, website, blog) {
    modalName.textContent = name;
    modalWebsite.href = website;
    modalBlog.href = blog;
    backdrop.classList.add('open');
  }

  function closeModal() {
    backdrop.classList.remove('open');
  }

  document.getElementById('modal-close').addEventListener('click', closeModal);
  backdrop.addEventListener('click', e => { if (e.target === backdrop) closeModal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  // Report
  fetch("report.json").then(r => r.json()).then(d => {
    document.getElementById("meta").textContent = d.period + " ";
    document.getElementById("content").innerHTML = d.companies.map(c => `
      <div class="company">
        <div class="company-header" data-name="${c.name}" data-website="${c.website || ''}" data-blog="${c.blog || ''}">
          <div class="company-dot${c.no_update ? ' no-update' : ''}"></div>
          <h2 class="company-name">${c.name}</h2>
          <span class="header-chevron">⊕</span>
        </div>
        <div class="company-body">
          ${c.no_update
            ? `<div class="no-update-text">특이사항 없음</div>`
            : `
              ${c.items.map(i => {
                const text = typeof i === 'object' ? i.text : i;
                const url = typeof i === 'object' ? i.url : '';
                const content = url
                  ? `<a href="${url}" target="_blank" rel="noopener">${text}<span class="item-arrow">↗</span></a>`
                  : text;
                return `<div class="item">${content}</div>`;
              }).join("")}
              <div class="watch">
                <span class="watch-label">BD Watch</span>
                ${c.watch}
              </div>
            `
          }
        </div>
      </div>
    `).join("");

    document.querySelectorAll('.company-header').forEach(el => {
      el.addEventListener('click', () => {
        openModal(el.dataset.name, el.dataset.website, el.dataset.blog);
      });
    });
  }).catch(() => {});
</script>
</body>
</html>
